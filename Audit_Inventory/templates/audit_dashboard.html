{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
    <!-- Add forms or lists for repairs in future expansions -->
    <center> Please Select Your School </center>

 {% if locations %}
    <div class="card" style="margin:40px">
        <div class="card-body" style="margin:20px">
            <div class="table-responsive">
                <table class ="table table-hover">
                    <thead>
                        <tr>
                            <th>School</th>
                            <th>Room </th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for location in locations %}
                        <tr>
                            <td><a href="{% url 'perform_audit' location.pk %}"> {{ location }} </a></td>

                        {% endfor %}
{% endif %}

{% endblock %}
