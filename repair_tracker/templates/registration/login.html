{% block content %}
{% load static %}

<div style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-top:20px; ">

    <img src="{% static 'Logos/Hendrick_Hudson_Logo_2014v.png' %}" style="height: 400px; width: 400px;">
    <h2>Log In</h2>

    <div class='container'>
        <div class='row justify-content-center'>
            <div class="col-md-6">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row mb-3 align-items-center">
                        <label for="{{ form.username.id_for_label }}" class="col-sm-4 col-form-label text-end">Username:</label>
                        <div class="col-sm-8">
                            {{ form.username }}
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="{{ form.password.id_for_label }}" class="col-sm-4 col-form-label text-end">Password:</label>
                        <div class="col-sm-8">
                            {{ form.password }}
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">Log In</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
