
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">  <!-- can switch to "dark" later -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>{% block title %}Hendrick Hudson School District Repair Tracking{% endblock %}</title>

    <!-- Bootstrap 5.3+ CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">

    <!-- Your custom CSS (optional) -->
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

    {% include 'header.html' %}

    <main class="flex-grow-1">
        <div class="container-fluid py-4">
            {% block messages %}
                {% if messages %}
                    <div class="container">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endblock %}

            {% block content %}
                <!-- Child templates fill this -->
            {% endblock %}
        </div>
    </main>

   <!-- Bootstrap JS + Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
            crossorigin="anonymous"></script>

    <!-- Your extra JS (charts, custom behavior, etc.) -->
    {% block extra_js %}
    <script>
(function () {
  const input = document.getElementById('inv-search-input');
  const dropdown = document.getElementById('inv-search-dropdown');
  if (!input) return;

  let timer;

  input.addEventListener('input', function () {
    clearTimeout(timer);
    const q = this.value.trim();
    if (q.length < 2) { dropdown.style.display = 'none'; return; }
    timer = setTimeout(() => fetchResults(q), 250);   // 250ms debounce
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { dropdown.style.display = 'none'; input.value = ''; }
  });

  document.addEventListener('click', function (e) {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });

  function fetchResults(q) {
    fetch(`/inventory/search/?q=${encodeURIComponent(q)}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(r => r.json())
    .then(data => renderDropdown(data.results))
    .catch(() => { dropdown.style.display = 'none'; });
  }

  function renderDropdown(results) {
    if (!results.length) {
      dropdown.innerHTML = '<div style="padding:12px 16px; color:#888; font-size:13px;">No devices found</div>';
      dropdown.style.display = 'block';
      return;
    }
    dropdown.innerHTML = results.map(r => `
      <a href="${r.url}"
         style="display:flex; flex-direction:column; padding:10px 16px;
                text-decoration:none; color:#1a1a1a; border-bottom:1px solid #f0f0f0;
                transition: background 0.15s;"
         onmouseover="this.style.background='#f5f8ff'"
         onmouseout="this.style.background='transparent'">
        <span style="font-weight:600; font-size:13px;">${r.asset_name}</span>
        <span style="font-size:11px; color:#666; margin-top:2px;">
          Asset&nbsp;#${r.asset_id} &nbsp;·&nbsp; S/N:&nbsp;${r.serial_number}
          &nbsp;·&nbsp; ${r.model} &nbsp;·&nbsp; ${r.location}
        </span>
      </a>`).join('');
    dropdown.style.display = 'block';
  }
})();
</script>



{% include 'footer.html' %}


{% endblock %}




</body>
</html>
